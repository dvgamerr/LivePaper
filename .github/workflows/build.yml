name: Build

on:
  push:
    branches: [ main ]
    tags: [ v* ]
  pull_request:
    branches: [ main ]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
    - name: Install Dependencies Linux
      if: runner.os == 'Linux'
      run: sudo apt-get -yq update && sudo apt-get -yq install cmake libsdl2-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev libavdevice-dev
    
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=${{env.BUILD_TYPE}}

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config ${{env.BUILD_TYPE}}
      
    - name: Set env
      run: echo "RELEASE_VERSION=${GITHUB_REF#refs/*/}" >> $GITHUB_ENV

    - name: Package
      if: runner.os == 'Windows' # && github.ref != 'refs/heads/main'
      run: |
        cd build
        cpack

    - name: Publish Windows
      if: runner.os == 'Windows'
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ env.RELEASE_VERSION }}
        commit: main
        allowUpdates: true
        artifactErrorsFailBuild: true
        prerelease: true
        removeArtifacts: true
        artifacts: "${{github.workspace}}/build/dist/*.*"

    - name: Make Directory for Linux
      if: runner.os != 'Windows'
      run: |
        mkdir -p ${{github.workspace}}/build/dist
        cp ./build/live-paper ${{github.workspace}}/build/dist/

    - name: Publish Linux
      if: runner.os != 'Windows'
      uses: ncipollo/release-action@v1
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        tag: $RELEASE_VERSION
        commit: main
        allowUpdates: true
        artifactErrorsFailBuild: true
        prerelease: true
        removeArtifacts: true
        artifacts: "${{github.workspace}}/build/dist/*"
